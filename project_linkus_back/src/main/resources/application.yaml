spring:
  application:
    name: project_linkus_back

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB

  datasource:
    # MySQL 드라이버
    driver-class-name: com.mysql.cj.jdbc.Driver

    # DB 연결 주소
    url: ${DB_URL:jdbc:mysql://localhost:3306/linkus}

    # 환경변수 DB_USER 없으면 root 사용
    username: ${DB_USER:root}

    password: ${DB_PW}

  jpa:
    hibernate:
      # 실행 시 테이블 자동 업데이트
      # create : 실행마다 새로 생성
      # update : 변경사항만 반영
      # validate : 엔티티와 테이블 검증
      # none : 사용 안함
      ddl-auto: validate

    properties:
      hibernate:
        # 실행 SQL 출력
        show_sql: ${JPA_SHOW_SQL:false}

        # SQL 예쁘게 출력
        format_sql: true

    # MySQL 방언 설정
    database-platform: org.hibernate.dialect.MySQLDialect

#    #JPA 테이블을 생성한 후에 data.sql을 실행해라
#    defer-datasource-initialization: true

  data:
    redis:
      host: ${REDIS_ENDPOINT:localhost}

      port: ${REDIS_PORT:6379}

      password: ${REDIS_PW}

      connect-timeout: 2s
      timeout: 2s


# 기본으로 사용할 secret 키(그냥 아무렇게나 100자 정도로 치면 됨)
  jwt:
    secret: ${JWT_SECRET:vmfhaltmskdlstkfkdgodyroqkfwkdbalroqkfwkdbalaaaaaaaaaaaaaaaabbbbb}

#  autoconfigure:
#    exclude:
#      # 스프링 시큐리티 기본 로그인 비활성화
#      - org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

#  sql:
#    init:
#      mode: always # data.sql을 항상 실행(따라서 한번 실행한 뒤 주석처리하고 나중에 데이터 날아가거나 하면 다시 살려서 사용)

logging:
  level:
    # 바인딩 파라미터 출력
    org.hibernate.orm.jdbc.bind: ${HIBERNATE_BIND_LOG_LEVEL:info}

# S3 버킷 설정
cloud:
  aws:
    credentials:
      access-key: ${S3_ACCESS_KEY}
      secret-key: ${S3_SECRET_KEY}
    region:
      static: ${S3_REGION:us-east-2}
    s3:
      bucket: ${S3_BUCKET:linkus-631860341508-us-east-2-an}

kakao:
  oauth:
    rest-api-key: ${KAKAO_REST_API_KEY}
    client-secret: ${KAKAO_CLIENT_SECRET}
    redirect-uri: ${KAKAO_REDIRECT_URI:http://localhost:3000/oauth/kakao/callback}

google:
  oauth:
    client-id: ${GOOGLE_CLIENT_ID}
    client-secret: ${GOOGLE_CLIENT_SECRET}
    redirect-uri: ${GOOGLE_REDIRECT_URI:http://localhost:3000/oauth/google/callback}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

server:
  forward-headers-strategy: framework
