name: Build and deploy LinkUs

on:
  push:
    branches: ["main"]
    paths:
      - "project_linkus_back/**"
      - "project_linkus_front/**"
      - "infra/**"
      - ".github/workflows/deploy.yml"

permissions:
  contents: read

concurrency:
  group: linkus-production
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - context: project_linkus_back
            image: linkus-back
          - context: project_linkus_front
            image: linkus-front
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:${{ github.sha }}
          build-args: |
            VITE_KAKAOMAP_KEY=${{ secrets.VITE_KAKAOMAP_KEY }}
            VITE_KAKAO_REST_API_KEY=${{ secrets.VITE_KAKAO_REST_API_KEY }}
            VITE_KAKAO_REDIRECT_URI=https://jw-linkus.com/oauth/kakao/callback
            VITE_GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }}
            VITE_GOOGLE_REDIRECT_URI=https://jw-linkus.com/oauth/google/callback
            VITE_EMAILJS_SERVICE_ID=${{ secrets.VITE_EMAILJS_SERVICE_ID }}
            VITE_EMAILJS_TEMPLATE_ID=${{ secrets.VITE_EMAILJS_TEMPLATE_ID }}
            VITE_EMAILJS_PUBLIC_KEY=${{ secrets.VITE_EMAILJS_PUBLIC_KEY }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy on EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
            host: ${{ secrets.EC2_HOST }}
            username: ${{ secrets.EC2_USER }}
            key: ${{ secrets.EC2_SSH_KEY }}
            script: |
              set -e
              sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/linkus-back:latest
              sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/linkus-front:latest
              cd ~/app || { mkdir -p ~/app; cd ~/app; }
              sudo docker compose -f infra/docker-compose.prod.yml --env-file infra/.env.prod up -d --remove-orphans
              sudo docker image prune -f
