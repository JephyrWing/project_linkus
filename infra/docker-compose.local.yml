name: linkus-local

services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: linkus
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - dbdata:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p$$MYSQL_ROOT_PASSWORD"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4-alpine
    environment:
      REDIS_PW: ${REDIS_PW:-local-redis-password}
    command:
      - sh
      - -c
      - exec redis-server --appendonly yes --requirepass "$$REDIS_PW"
    ports:
      - "6379:6379"
    volumes:
      - redis_local_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PW\" ping | grep PONG"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ../project_linkus_back
    env_file:
      - .env.local.back
    environment:
      SPRING_PROFILES_ACTIVE: local
      DB_URL: jdbc:mysql://db:3306/linkus?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=utf8
      DB_USER: root
      DB_PW: ${MYSQL_ROOT_PASSWORD}
      REDIS_ENDPOINT: redis
      REDIS_PORT: "6379"
      REDIS_PW: ${REDIS_PW:-local-redis-password}
      CORS_ALLOWED_ORIGINS: http://localhost:3000
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ../project_linkus_front
      args:
        VITE_KAKAOMAP_KEY: ${VITE_KAKAOMAP_KEY}
        VITE_KAKAO_REST_API_KEY: ${VITE_KAKAO_REST_API_KEY}
        VITE_KAKAO_REDIRECT_URI: http://localhost/oauth/kakao/callback
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID}
        VITE_GOOGLE_REDIRECT_URI: http://localhost/oauth/google/callback
        VITE_EMAILJS_SERVICE_ID: ${VITE_EMAILJS_SERVICE_ID}
        VITE_EMAILJS_TEMPLATE_ID: ${VITE_EMAILJS_TEMPLATE_ID}
        VITE_EMAILJS_PUBLIC_KEY: ${VITE_EMAILJS_PUBLIC_KEY}
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  dbdata:
  redis_local_data:
