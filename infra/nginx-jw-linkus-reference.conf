# Certbot이 생성한 ssl_certificate 설정은 기존 Ubuntu Nginx 설정을 유지하세요.
# 아래 핵심은 HTTPS 요청 전체를 Docker frontend의 localhost 포트로 전달하는 것입니다.

server {
    listen 80;
    server_name jw-linkus.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name jw-linkus.com;

    ssl_certificate /etc/letsencrypt/live/jw-linkus.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jw-linkus.com/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
